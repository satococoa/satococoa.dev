name = "satococoa-dev"
main = "./dist/server/entry.mjs"
compatibility_date = "2026-03-17"
compatibility_flags = ["nodejs_compat"]
no_bundle = true

rules = [
  { type = "ESModule", globs = ["**/*.js", "**/*.mjs"] },
]

[assets]
binding = "ASSETS"
directory = "./dist/client"

[observability]
enabled = true
